<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="css/style.css">
    <title>Documentos</title>
</head>

<body>
    <div class="sidebar">
        <a href="#" class="logo">
            <i class='bx bxs-spreadsheet'></i>
            <div class="logo-name"><span>Consulta</span>Documentos</div>
        </a>
        </a>
        <ul class="side-menu">
            <li><a href="javascript:void(0);" onclick="exibirFiltro('motoristas')"><i class='bx bx-id-card'></i>CNH Motoristas</a></li>
            <li><a href="javascript:void(0);" onclick="exibirFiltro('placas')"><i class='bx bx-car'></i>CRLV Frota</a></li>
        </ul>
    </div>
    <!-- End of Sidebar -->

    <!-- Main Content -->
    <div class="content">
        <!-- Navbar -->
        <nav>
            <i class='bx bx-menu'></i>
            <form action="#">
                <div class="form-input">
                    <input type="search" id="searchField" placeholder="Digite para filtrar..." onkeyup="filtrarDados()">
                    <button class="search-btn" type="button"><i class='bx bx-search'></i></button>
                </div>
            </form>
            <input type="checkbox" id="theme-toggle" hidden>
            <label for="theme-toggle" class="theme-toggle">
                <i class='bx bxs-sun' style='color:#ffe600; font-size: 18px'></i>
                <i class='bx bxs-moon' style='color:#86e3ff; font-size: 18px'></i>
            </label>         
            
        </nav>
        <!-- End of Navbar -->

        <main>
            <div id="filtroMotoristas" style="display:none;">
                <div id="listaMotoristas" class="motorista-container"></div>
            </div>
            <div id="filtroPlacas" style="display:none;">
                <div id="listaPlacas" class="placas-container"></div>
            </div>
        </main>
    </div>
    <script src="scripts/script.js"></script>
    <script src="scripts/motoristas.js"></script>
    <script src="scripts/placas.js"></script>
    <script>
        // Adiciona a classe 'dark' ao body para iniciar no modo dark
       document.body.classList.add('dark');
    </script>
</body>

</html>
